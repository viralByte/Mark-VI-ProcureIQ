version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: po_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: podb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - po_network

  mongodb:
    image: mongo:6.0
    container_name: po_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - po_network

  fastapi-backend:
    build: ./backend-fastapi
    container_name: po_fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@postgres:5432/podb
      - MONGO_URL=mongodb://admin:secretpassword@mongodb:27017/
      - GOOGLE_CLIENT_ID=your_client_id_here
      - GOOGLE_CLIENT_SECRET=your_client_secret_here
      - JWT_SECRET=your_jwt_secret_here
      - GEMINI_API_KEY=your_gemini_key_here
    depends_on:
      - postgres
      - mongodb
    networks:
      - po_network
    volumes:
      - ./backend-fastapi:/app # For hot-reloading during dev

volumes:
  postgres_data:
  mongodb_data:

networks:
  po_network:
    driver: bridge